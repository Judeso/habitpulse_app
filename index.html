<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HabitPulse Test</title>
<style>
  body { background: #0c0e13; color: #f0ede8; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
  #onboarding { display: block; }
  #app { display: none; }
  #app.show { display: block; }
  .card { background: #1d2030; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; max-width: 400px; margin: 0 auto; }
  h1 { color: #c8f07c; margin: 0 0 8px; }
  p { color: #7a8090; margin: 0 0 24px; }
  label { display: block; font-size: 12px; color: #7a8090; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  input { width: 100%; box-sizing: border-box; background: #12151d; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #f0ede8; font-size: 16px; padding: 12px; margin-bottom: 20px; outline: none; }
  .habits { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .habit { background: #12151d; border: 2px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px; cursor: pointer; font-size: 14px; color: #f0ede8; }
  .habit.selected { border-color: #c8f07c; background: rgba(200,240,124,0.1); color: #c8f07c; }
  button { width: 100%; padding: 14px; background: #c8f07c; color: #0c0e13; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  .note { font-size: 11px; color: #7a8090; text-align: center; margin-bottom: 16px; }
  /* APP */
  .header { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: #0c0e13; position: sticky; top: 0; }
  .logo { color: #c8f07c; font-size: 20px; font-weight: 900; }
  .pts { background: rgba(200,240,124,0.12); border: 1px solid rgba(200,240,124,0.25); border-radius: 20px; padding: 6px 12px; font-size: 14px; color: #c8f07c; }
  .content { padding: 16px; padding-bottom: 80px; }
  .section-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .section-sub { color: #7a8090; font-size: 13px; margin-bottom: 16px; }
  .hcard { background: #1d2030; border: 2px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; cursor: pointer; }
  .hcard.done { border-color: rgba(200,240,124,0.3); background: rgba(200,240,124,0.04); }
  .check { width: 26px; height: 26px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); background: #12151d; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .hcard.done .check { background: #c8f07c; border-color: #c8f07c; }
  .hname { font-weight: 700; font-size: 15px; }
  .hcard.done .hname { color: #c8f07c; }
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0c0e13; border-top: 1px solid rgba(255,255,255,0.07); display: flex; padding: 10px 0 16px; }
  .nav-item { flex: 1; text-align: center; cursor: pointer; font-size: 11px; color: #7a8090; text-transform: uppercase; letter-spacing: 1px; }
  .nav-item.active { color: #c8f07c; }
  .nav-icon { font-size: 20px; display: block; margin-bottom: 3px; }
</style>
</head>
<body>

<!-- ONBOARDING -->
<div id="onboarding">
  <div class="card">
    <h1>🌱 HabitPulse</h1>
    <p>Construis de meilleures habitudes.</p>

    <label>Ton prénom</label>
    <input type="text" id="inName" placeholder="Marie" oninput="checkForm()">

    <label>Pseudo (amis)</label>
    <input type="text" id="inUser" placeholder="marie_42" oninput="checkForm()">

    <label>Choisis 3 habitudes</label>
    <div class="habits" id="habitGrid"></div>
    <p class="note">🔒 Illimité avec Premium</p>

    <button id="startBtn" onclick="startApp()" disabled>Commencer →</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div>
      <div class="logo">HabitPulse</div>
      <div style="font-size:12px;color:#7a8090" id="greetEl">Bonjour !</div>
    </div>
    <div class="pts">⭐ <span id="ptsEl">0</span> pts</div>
  </div>

  <div class="content" id="tab-today">
    <div class="section-title">Mes habitudes</div>
    <div class="section-sub" id="dateEl"></div>
    <div id="hList"></div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active"><span class="nav-icon">🏠</span>Accueil</div>
    <div class="nav-item"><span class="nav-icon">🧠</span>Quiz</div>
    <div class="nav-item"><span class="nav-icon">👥</span>Amis</div>
    <div class="nav-item"><span class="nav-icon">📊</span>Stats</div>
  </div>
</div>

<script>
var HABITS = [
  {id:'water', e:'💧', n:"Boire 2L d'eau"},
  {id:'sport', e:'🏃', n:'Sport 20min'},
  {id:'sleep', e:'😴', n:'Dormir 8h'},
  {id:'read',  e:'📖', n:'Lire 15min'},
  {id:'medi',  e:'🧘', n:'Méditer'},
  {id:'food',  e:'🥗', n:'Manger sainement'},
  {id:'grat',  e:'🙏', n:'Gratitude'},
  {id:'nosc',  e:'📵', n:"Pas d'écran le matin"},
];

var selected = [];
var STATE = { name:'', username:'', habits:[], logs:{}, points:0 };

function load() {
  try {
    var d = localStorage.getItem('hp_v1');
    if (d) STATE = JSON.parse(d);
  } catch(e) {}
}
function save() {
  try { localStorage.setItem('hp_v1', JSON.stringify(STATE)); } catch(e) {}
}
function today() {
  return new Date().toISOString().slice(0,10);
}

// Init grid
document.addEventListener('DOMContentLoaded', function() {
  load();

  var grid = document.getElementById('habitGrid');
  HABITS.forEach(function(h) {
    var div = document.createElement('div');
    div.className = 'habit';
    div.id = 'h_' + h.id;
    div.innerHTML = h.e + ' ' + h.n;
    div.onclick = function() { toggleHabit(h.id); };
    grid.appendChild(div);
  });

  if (STATE.name && STATE.habits && STATE.habits.length > 0) {
    showApp();
  }
});

function toggleHabit(id) {
  var idx = selected.indexOf(id);
  var el = document.getElementById('h_' + id);
  if (idx > -1) {
    selected.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    if (selected.length >= 3) {
      el.style.borderColor = '#f07c7c';
      setTimeout(function() { el.style.borderColor = ''; }, 600);
      return;
    }
    selected.push(id);
    el.classList.add('selected');
  }
  checkForm();
}

function checkForm() {
  var n = document.getElementById('inName').value.trim();
  var u = document.getElementById('inUser').value.trim();
  document.getElementById('startBtn').disabled = !(n && u && selected.length === 3);
}

function startApp() {
  var n = document.getElementById('inName').value.trim();
  var u = document.getElementById('inUser').value.trim();
  if (!n || !u || selected.length !== 3) return;

  STATE.name = n;
  STATE.username = u;
  STATE.habits = selected.map(function(id) {
    return HABITS.find(function(h) { return h.id === id; });
  });
  STATE.logs = {};
  STATE.points = 0;
  save();
  showApp();
}

function showApp() {
  document.getElementById('onboarding').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('greetEl').textContent = 'Bonjour, ' + STATE.name + ' !';
  document.getElementById('ptsEl').textContent = STATE.points;

  var opts = { weekday:'long', day:'numeric', month:'long' };
  document.getElementById('dateEl').textContent = new Date().toLocaleDateString('fr-FR', opts);

  renderHabits();
}

function renderHabits() {
  var list = document.getElementById('hList');
  var log = STATE.logs[today()] || [];
  list.innerHTML = '';

  STATE.habits.forEach(function(h) {
    var done = log.indexOf(h.id) > -1;
    var card = document.createElement('div');
    card.className = 'hcard' + (done ? ' done' : '');
    card.innerHTML = '<div class="check">' + (done ? '✓' : '') + '</div>' +
                     '<span style="font-size:20px">' + h.e + '</span>' +
                     '<div class="hname">' + h.n + '</div>';
    card.onclick = function() { toggleLog(h.id); };
    list.appendChild(card);
  });
}

function toggleLog(id) {
  if (!STATE.logs[today()]) STATE.logs[today()] = [];
  var log = STATE.logs[today()];
  var idx = log.indexOf(id);
  if (idx > -1) {
    log.splice(idx, 1);
  } else {
    log.push(id);
    STATE.points += 10;
    document.getElementById('ptsEl').textContent = STATE.points;
  }
  save();
  renderHabits();
}
</script>
</body>
</html>
